- name: "INFO: Check postgresql state"
  ansible.builtin.debug:
    msg: "checking {{ adempiere_container_filter }}.postgresql | expected: running"

- name: Check postgresql is running
  ansible.builtin.command: >
    docker inspect -f "{{'{{'}}.State.Status{{'}}'}}"
    {{ adempiere_container_filter }}.postgresql
  register: pg_validate
  changed_when: false
  failed_when: pg_validate.rc != 0 or pg_validate.stdout | trim != "running"

- name: "INFO: Check ZK state"
  ansible.builtin.debug:
    msg: "checking {{ adempiere_container_filter }}.zk | expected: running"

- name: Check ZK is running
  ansible.builtin.command: >
    docker inspect -f "{{'{{'}}.State.Status{{'}}'}}"
    {{ adempiere_container_filter }}.zk
  register: zk_validate
  changed_when: false
  failed_when: zk_validate.rc != 0 or zk_validate.stdout | trim != "running"

- name: Report OK if all services look healthy
  ansible.builtin.debug:
    msg: "OK: postgresql=running, zk=running"
