#SPDX-License-Identifier: MIT-0
##
## ROLE: deploy-adempiere
## PURPOSE: Clones the ADempiere UI Gateway repository and starts the Docker Compose stack
##          on the BackEnd server.
##
## CONTEXT:
##   - Targets the 'BackEnd' group only. Do NOT run against FrontEnd.
##   - Runs as adempiere_username with sudo (become: true). Requires credentials
##     from vault (adempiere_user_password, adempiere_user_become_pass).
##   - Must run AFTER install-docker.yml (Docker CE must be present).
##   - The ADempiere container stack (adempiere-ui-gateway) includes the application server
##     and a PostgreSQL database. It is accessed internally by Traefik on the FrontEnd via HTTP.
##
## WHAT THIS ROLE DOES (in order):
##   1. Gathers network facts (used in override.env templating).
##   2. Creates the installation directory ({{ install_path }}) owned by {{ be_user }}.
##   3. Clones or updates the adempiere-ui-gateway repo from GitHub ({{ repo_url }},
##      branch {{ repo_version }}). ansible.builtin.git with update: yes fetches the latest
##      commits on every run — idempotent by design, no sentinel file needed.
##   4. Generates override.env from templates/override.env.j2 (contains DB passwords, URLs, etc.)
##      with mode 0600 — only the owner can read it.
##   5. Checks whether the ADempiere container is already running via docker ps.
##   6. If not running: includes start.yml (docker compose up) and wait.yml (waits for container).
##   7. Includes validate.yml — checks for containers in bad state (Exited/Restarting/Dead).
##   8. Includes status.yml — prints the running container table.
##
## KEY VARIABLES (configure in group_vars/all/vars.yml or roles/deploy-adempiere/defaults/main.yml):
##   install_path               : directory where the repo is cloned
##   be_user                    : owner of files and compose operations (inherits from adempiere_username)
##   repo_url                   : GitHub URL of adempiere-ui-gateway
##   repo_version               : branch or tag to deploy (e.g. "main", "adempiere-trunk")
##   adempiere_container_filter : string used to filter docker ps output
##
## SIDE EFFECTS:
##   - Pulls from GitHub on each run (update: yes). Local uncommitted changes on the server
##     will be overwritten if they conflict with the remote branch.
##   - override.env is written with mode 0600 and contains plaintext secrets at rest on the server.
##   - Docker Compose stack remains running after the play; it is not stopped by this role.
##
---
# tasks file for roles/deploy-adempiere
- name: Gather network facts
  ansible.builtin.setup:
    gather_subset:
      - network

- name: Ensure development directory exists
  ansible.builtin.file:
    path: "{{ install_path }}"
    state: directory
    owner: "{{ be_user }}"
    group: "{{ be_user }}"
    mode: "0755"
  become: true

- name: Clone or update adempiere-ui-gateway repository
  ansible.builtin.git:
    repo: "{{ repo_url }}"
    dest: "{{ install_path }}/adempiere-ui-gateway"
    version: "{{ repo_version }}"
    update: yes
  become: yes
  become_user: "{{ be_user }}"

- name: Generate override.env file
  ansible.builtin.template:
    src: override.env.j2
    dest: "{{ install_path }}/adempiere-ui-gateway/docker-compose/override.env"
    owner: "{{ be_user }}"
    group: "{{ be_user }}"
    mode: "0600"

- name: Check if ADempiere container is already running
  ansible.builtin.command: >
    docker ps --filter "name={{ adempiere_container_filter }}"
    --format "{{'{{'}}.Names{{'}}'}}"
  register: container_running
  changed_when: false

- name: Import tasks
  ansible.builtin.include_tasks:
    file: "{{ item }}"
  with_items:
    - start.yml
    - wait.yml
  when: container_running.stdout | trim == ""

- name: Import tasks
  ansible.builtin.include_tasks:
    file: "{{ item }}"
  with_items:
    - validate.yml
    - status.yml
