- name: Run start-all.sh (bring up services)
  ansible.builtin.command: "./start-all.sh"
  args:
    chdir: "{{ install_path }}/adempiere-ui-gateway/docker-compose/"
    creates: "{{ status_file }}"
  register: start_all
  changed_when: true

- name: Ensure status is "runned"
  copy:
    content: "runned"
    dest: "{{ status_file }}"
  when: status_result.stat.exists