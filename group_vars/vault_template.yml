---
# Template for group_vars/all/vault.yml — secret credentials.
#
# HOW TO USE:
#   cp group_vars/all/vault_template.yml group_vars/all/vault.yml
#   Fill in your real passwords.
#   Encrypt it: ansible-vault encrypt group_vars/all/vault.yml
#   group_vars/all/vault.yml is gitignored — never commit it.
#
# To view or edit after encryption:
#   ansible-vault view group_vars/all/vault.yml
#   ansible-vault edit group_vars/all/vault.yml

# Root password for initial server access (used by serversprep.yml and serversconf.yml only)
root_user_password: 'your-root-password'

# SSH password and sudo password for the adempiere_username account (post-hardening)
adempiere_user_password: 'your-admin-user-password'
adempiere_user_become_pass: 'your-admin-sudo-password'

# PostgreSQL credentials
# postgres_password: PostgreSQL superuser password — used by deploy-adempiere and adempiere-restoredb
# adempiere_password: password for the adempiere DB user (optional — falls back to postgres_password if not set)
postgres_password: 'your-postgres-superuser-password'
adempiere_password: 'your-adempiere-db-password'

# Cloudflare credentials (required when deploy_traefik is true)
# cloudflare_token: API token with DNS:Edit permission — create at https://dash.cloudflare.com/profile/api-tokens
# cloudflare_email: email address of your Cloudflare account
cloudflare_token: 'your-cloudflare-api-token'
cloudflare_email: 'your-cloudflare-account-email'
